events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ==========================================================
    # 1. KÊNH MẶC ĐỊNH CỔNG 80 (Dành riêng cho Prometheus nội bộ)
    # ==========================================================
    server {
        listen 80 default_server;
        server_name _;

        # Prometheus nội bộ sẽ cào dữ liệu ở đây thành công 100%
        location /metrics {
            stub_status on;
            allow all;
        }

        # Nếu người dùng gõ nhầm IP hoặc gọi domain khác ở cổng 80, chuyển hướng sang HTTPS chính
        location / {
            return 301 https://chaters.shop$request_uri;
        }
    }

    # ==========================================================
    # 2. CHUYỂN HƯỚNG TƯỜNG MINH CHO TỪNG DOMAIN (CỔNG 80)
    # ==========================================================
    server {
        listen 80;
        server_name chaters.shop www.chaters.shop;
        return 301 https://chaters.shop$request_uri;
    }

    server {
        listen 80;
        server_name grafana.chaters.shop;
        return 301 https://grafana.chaters.shop$request_uri;
    }

    server {
        listen 80;
        server_name fe.chaters.shop;
        return 301 https://fe.chaters.shop$request_uri;
    }

    # ==========================================================
    # 3. CẤU HÌNH HTTPS (443) CHO ỨNG DỤNG CHÍNH
    # ==========================================================
    server {
        listen 443 ssl;
        server_name chaters.shop www.chaters.shop;

        ssl_certificate /etc/letsencrypt/live/chaters.shop/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chaters.shop/privkey.pem;

        location / {
            proxy_pass http://backend:4000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api {
            return 200 "200";
        }

        location /user {
            return 200 "user";
        }
    }

    # ==========================================================
    # 4. CẤU HÌNH HTTPS (443) CHO GRAFANA
    # ==========================================================
    server {
        listen 443 ssl;
        server_name grafana.chaters.shop;

        ssl_certificate /etc/letsencrypt/live/grafana.chaters.shop/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/grafana.chaters.shop/privkey.pem;

        location / {
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # ==========================================================
    # 5. CẤU HÌNH HTTPS (443) CHO FRONTEND
    # ==========================================================
    server {
        listen 443 ssl;
        server_name fe.chaters.shop;

        ssl_certificate /etc/letsencrypt/live/fe.chaters.shop/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/fe.chaters.shop/privkey.pem;

        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
