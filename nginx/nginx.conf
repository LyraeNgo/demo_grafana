events {}

http {

    server {
        listen 80;
        server_name chaters.shop;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name chaters.shop;

        ssl_certificate /etc/letsencrypt/live/chaters.shop/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/chaters.shop/privkey.pem;

        location / {
            proxy_pass http://backend:4000; 
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api {
            return 200 "200";
        }

        location /user {
            return 200 "user";
        }
    }
}
