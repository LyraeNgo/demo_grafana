services:
  nginx:
    image: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
    ports:
      - "80:80"
      - "443:443"
    networks:
      - abc
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      grafana:
        condition: service_healthy
  mongodb:
    image: mongo:latest
    container_name: mongodb_prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: chaters_db
    volumes:
      - mongo_data:/data/db
    networks:
      - abc
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: mongodb_exporter
    restart: always
    command:
      - '--mongodb.uri=mongodb://admin:admin123@mongodb_prod:27017/?authSource=admin' # Thay bằng URI kết nối nội bộ trong Docker của bạn
    ports:
      - "9216:9216"
    networks:
      - abc
    
  backend:
    build: .
    image: be
    environment:
      - OTEL_SERVICE_NAME=my_python_api
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://tempo:4318/v1/traces
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - MONGO_URL=mongodb://admin:admin123@mongodb:27017/chaters_db?authSource=admin
      - MONGO_DB_NAME=chaters_db

    restart: always
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - abc
    ports:
      - "4000:4000"

  frontend:
    build: ./Frontend
    image: fe
    restart: always
    networks:
      - abc

  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - abc

  node-exporter:
    image: prom/node-exporter:latest # Hoặc phiên bản bạn đang dùng
    container_name: node-exporter
    restart: always
    volumes:
      # Lệnh này mount toàn bộ ổ cứng gốc (/) của server EC2 vào thư mục /hostfs bên trong container với quyền chỉ đọc (ro - read only)
      - /:/hostfs:ro    
    command:
      # Báo cho node-exporter biết rằng /hostfs chính là ổ cứng vật lý cần đo lường
      - '--path.rootfs=/hostfs' 
    ports:
      - "9100:9100"
    networks:
      - abc

  grafana:
    image: grafana/grafana
    env_file:
      - path: ./grafana/grafana.env
        required: false
    environment:
      - GF_SERVER_DOMAIN=grafana.chaters.shop
      - GF_SERVER_ROOT_URL=https://grafana.chaters.shop/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    ports:
      - "3000:3000"
    volumes:
      # Persist Grafana data across container recreation.
      - grafana_data:/var/lib/grafana
      # Load Grafana provisioning files and dashboards from source control.
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - abc

  loki:
    image: grafana/loki:latest
    container_name: loki
    networks:
      - abc
    ports:
      - "3100:3100"

    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    user: "root"
    container_name: promtail

    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - -config.file=/etc/promtail/config.yml

    depends_on:
      - loki
    networks:
      - abc
    
  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
       - ./tempo.yaml:/etc/tempo.yaml:ro
    ports:
     - "4317:4317"
     - "4318:4318"
     - "3200:3200"    
    networks:
      - abc

networks:
  abc:
    driver: bridge
    
volumes:
  mongo_data:
  grafana_data:
