global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "backend"
    static_configs:
      - targets: ["backend:4000"]

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metric_relabel_configs:
      # Bẫy tất cả các ID có chứa chuỗi docker hoặc scope của container
      - source_labels: [id]
        regex: '.*/(?:docker-)?([a-f0-9]{12})[a-f0-9]*.*'
        target_label: 'container_id'
        replacement: '$1'

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"] # Loki mặc định có sẵn endpoint /metrics

  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"] # Tempo mặc định có endpoint /metrics ở cổng 3200
