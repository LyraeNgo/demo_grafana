global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "backend"
    static_configs:
      - targets: ["backend:4000"]


  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"] # Loki mặc định có sẵn endpoint /metrics

  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"] # Tempo mặc định có endpoint /metrics ở cổng 3200

  - job_name: "mongodb"
    scrape_interval: 15s # Gợi ý: Nên giãn thời gian scrape của DB ra một chút
    static_configs:
      - targets: ["mongodb-exporter:9216"]
