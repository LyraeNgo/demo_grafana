apiVersion: 1

groups:
  - orgId: 1
    name: infrastructure-health
    folder: Observability
    interval: 1m
    rules:
      - uid: node-cpu-high
        title: Node CPU usage above 80%
        condition: B
        for: 5m
        noDataState: NoData
        execErrState: Error
        labels:
          severity: warning
          team: platform
        annotations:
          summary: CPU usage on {{ $labels.instance }} is above 80%
          description: Node CPU usage has stayed above 80% for 5 minutes.
        data:
          - refId: A
            datasourceUid: efpynw8skn2f4c
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: efpynw8skn2f4c
              editorMode: code
              expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
              type: query
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 80
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions

      - uid: prometheus-target-down
        title: Prometheus Target Down
        condition: B
        for: 2m
        noDataState: NoData
        execErrState: Error
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.job }} on {{ $labels.instance }} is DOWN"
          description: |
            Prometheus has failed to scrape target:
            Job: {{ $labels.job }}
            Instance: {{ $labels.instance }}

            The target has been unreachable for more than 2 minutes.
        data:
          - refId: A
            datasourceUid: efpynw8skn2f4c
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: efpynw8skn2f4c
              editorMode: code
              expr: up == 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
              type: query

          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
