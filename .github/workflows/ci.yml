name: FastAPI CI Pipeline

on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: ["main"] 

jobs:
  build-and-test: 
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run Ruff & Linting
        run: |
          pip install ruff yamllint
          ruff check .
          yamllint .

      - name: Validate Observability
        run: |
          docker run --rm --entrypoint=promtool -v $(pwd)/prometheus.yml:/prometheus.yml prom/prometheus:latest check config /prometheus.yml
          docker compose -f docker-compose.yml config

      - name: Run Security Audit
        run: |
          pip install pip-audit bandit
          pip-audit -r app/requirements.txt --strict
          bandit -r . -ll -f json -o bandit-report.json

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITLEAKS_TOKEN }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Login to Docker Hub 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ github.sha }}

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest # Nếu bạn dùng ssh-action thì dùng runner này
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Lệnh này chạy trên VM của bạn
            cd /path/to/your/project
            docker compose pull
            docker compose up -d
            curl -X POST -H "Authorization: Bearer ${GRAFANA_API_KEY}" http://localhost:3000/api/admin/provisioning/dashboards/reload