name: FastAPI CI Pipeline

on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: ["main"] 

jobs:
  build-and-test: 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Gitleaks to scan history

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run Ruff
        run: |
          pip install ruff
          ruff check .

      - name: Run Dependency Security Audit
        run: |
          pip install pip-audit
          # Corrected path to point to your requirements file
          pip-audit -r app/requirements.txt --strict

      - name: Run Static Analysis (Bandit)
        run: |
          pip install bandit
          bandit -r . -ll -f json -o bandit-report.json

      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITLEAKS_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-app:${{ github.sha }}