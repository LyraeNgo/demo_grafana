# Secret cho Backend
# Chứa connection string MongoDB và các biến môi trường nhạy cảm
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chaters.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Connection string trỏ đến Service 'mongodb' trong cùng namespace
  # K8s DNS: <service-name>.<namespace>.svc.cluster.local
  # Vì cùng namespace, chỉ cần dùng tên service: mongodb
  MONGO_URL: {{ printf "mongodb://%s:%s@mongodb:%v/%s?authSource=admin"
    .Values.mongodb.credentials.rootUsername
    .Values.mongodb.credentials.rootPassword
    .Values.mongodb.port
    .Values.mongodb.credentials.database | quote }}
  MONGO_DB_NAME: {{ .Values.mongodb.credentials.database | quote }}
  # TODO: Điền Discord Webhook URL nếu cần
  DISCORD_WEBHOOK_URL: ""
