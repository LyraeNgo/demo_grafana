# Deployment cho Nginx reverse proxy
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chaters.labels" . | nindent 4 }}
    {{- include "chaters.nginx.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      {{- include "chaters.nginx.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "chaters.nginx.selectorLabels" . | nindent 8 }}
      annotations:
        # Annotation này giúp ArgoCD/K8s reload nginx pod khi ConfigMap thay đổi
        # checksum được tính từ nội dung ConfigMap, nếu ConfigMap thay đổi -> pod restart
        checksum/config: {{ include (print $.Template.BasePath "/nginx/configmap.yaml") . | sha256sum }}
    spec:
      # Chờ backend Service sẵn sàng trước khi nginx start
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for backend to be ready..."
              until nc -z backend {{ .Values.backend.port }}; do
                echo "Backend not ready yet, sleeping 3s..."
                sleep 3
              done
              echo "Backend is ready!"
      containers:
        - name: nginx
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          # Mount nginx.conf từ ConfigMap
          # subPath: chỉ mount file cụ thể, không ghi đè toàn bộ /etc/nginx/
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          # Probe dùng /health endpoint (nginx tự trả về, không cần gọi backend)
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
