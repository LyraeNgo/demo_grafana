# Service cho Nginx - NodePort cho phép truy cập từ bên ngoài cluster
# NodePort: K8s mở port trên TẤT CẢ nodes, traffic được route vào nginx pod
# Truy cập: http://<NodeIP>:30080
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chaters.labels" . | nindent 4 }}
    {{- include "chaters.nginx.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.nginx.service.type }}
  ports:
    - port: {{ .Values.nginx.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
      {{- if eq .Values.nginx.service.type "NodePort" }}
      nodePort: {{ .Values.nginx.service.nodePort }}
      {{- end }}
  selector:
    {{- include "chaters.nginx.selectorLabels" . | nindent 4 }}
