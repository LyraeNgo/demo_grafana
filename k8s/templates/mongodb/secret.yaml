# Secret chứa credentials của MongoDB
# stringData: Kubernetes tự động base64-encode khi lưu vào etcd
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chaters.labels" . | nindent 4 }}
type: Opaque
stringData:
  root-username: {{ .Values.mongodb.credentials.rootUsername | quote }}
  root-password: {{ .Values.mongodb.credentials.rootPassword | quote }}
  database: {{ .Values.mongodb.credentials.database | quote }}
  # Connection string đầy đủ - dùng cho backend
  mongo-url: {{ printf "mongodb://%s:%s@mongodb:%v/%s?authSource=admin"
    .Values.mongodb.credentials.rootUsername
    .Values.mongodb.credentials.rootPassword
    .Values.mongodb.port
    .Values.mongodb.credentials.database | quote }}
