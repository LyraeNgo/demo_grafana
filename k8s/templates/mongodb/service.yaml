# Service nội bộ cho MongoDB
# type: ClusterIP = chỉ accessible trong cluster (đúng với database)
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "chaters.labels" . | nindent 4 }}
    {{- include "chaters.mongodb.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mongodb.port }}
      targetPort: {{ .Values.mongodb.port }}
      protocol: TCP
      name: mongodb
  selector:
    {{- include "chaters.mongodb.selectorLabels" . | nindent 4 }}
